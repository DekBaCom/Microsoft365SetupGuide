title: Microsoft 365 Setup Guide
description: A comprehensive guide for setting up Microsoft 365 tenant, Azure AD, Intune, and Collaboration Governance
baseurl: "/Microsoft365SetupGuide"
url: "https://DekBaCom.github.io"

theme: just-the-docs

# Enable search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux links in header
aux_links:
  "GitHub":
    - "https://github.com/DekBaCom/Microsoft365SetupGuide"

aux_links_new_tab: true

# Navigation
nav_sort: order

# Footer
footer_content: "Microsoft 365 Setup Guide &copy; 2024. Powered by <a href=\"https://pages.github.com/\">GitHub Pages</a> &amp; <a href=\"https://just-the-docs.com/\">Just the Docs</a>."

# Color scheme
color_scheme: light

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Last edit timestamp
last_edit_time_format: "%b %e %Y at %I:%M %p"

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
